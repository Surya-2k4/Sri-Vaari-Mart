name: vaari
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.1
  supabase_flutter: ^2.12.0
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  google_fonts: ^6.3.3
  razorpay_flutter: ^1.4.0
  pdf: ^3.10.0
  printing: ^5.11.0
  path_provider: ^2.1.0
  intl: ^0.18.0
  flutter_markdown: ^0.7.7+1
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  image_picker: ^1.2.1
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk value

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/onboarding/
    - .env
